<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Platform — Test Console</title>
<style>
  :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --success: #4ade80; --warn: #fbbf24; --error: #f87171; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 1200px; margin: 0 auto; padding: 1.5rem; display: grid; gap: 1.5rem; }
  .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 1.5rem; font-weight: 700; }
  .header h1 span { color: var(--accent); }
  .status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--error); }
  .dot.online { background: var(--success); }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; }
  .panel h2 { font-size: 1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .badge { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 1rem; background: var(--accent); color: var(--bg); }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.3rem; }
  input, select, textarea { width: 100%; padding: 0.6rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 0.5rem; color: var(--text); font-size: 0.85rem; font-family: monospace; }
  textarea { min-height: 120px; resize: vertical; }
  button { padding: 0.6rem 1.25rem; border: none; border-radius: 0.5rem; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-danger { background: var(--error); color: var(--bg); }
  .actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; font-size: 0.8rem; overflow-x: auto; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  .response { margin-top: 0.75rem; }
  .key-val { display: flex; gap: 0.5rem; align-items: center; }
  .key-val code { background: var(--bg); padding: 0.15rem 0.5rem; border-radius: 0.25rem; font-size: 0.8rem; }
  .tag { display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 0.25rem; background: var(--border); }
  .tag.created { background: var(--success); color: var(--bg); }
  .tag.duplicate { background: var(--warn); color: var(--bg); }
  .tag.invalid { background: var(--error); color: var(--bg); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .estimate-card { background: var(--bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; text-align: center; }
  .estimate-card .prop { font-size: 2rem; font-weight: 700; color: var(--accent); }
  .estimate-card .label { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }
  .flag-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }
  .stored { margin-top: 0.5rem; }
  .stored-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; background: var(--bg); border-radius: 0.35rem; margin-bottom: 0.25rem; font-size: 0.8rem; }
  .stored-item .vid { font-family: monospace; }
  .stored-item .status-tag { padding: 0.1rem 0.5rem; border-radius: 0.25rem; font-size: 0.7rem; }
  .status-draft { background: var(--border); }
  .status-published { background: var(--success); color: var(--bg); }
  @media (max-width: 768px) { .row, .grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Survey Platform <span>· Test Console</span></h1>
    <div class="status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Checking...</span>
    </div>
  </div>

  <!-- Auth Setup -->
  <div class="panel">
    <h2>🔑 Auth Setup</h2>
    <div class="row">
      <div>
        <label>Base URL</label>
        <input id="baseUrl" value="http://localhost:8000">
      </div>
      <div>
        <label>Token</label>
        <input id="token" placeholder="Paste your auth token here..." onchange="onTokenChange()" value="81853290e4f798fedf6beead3d07fd812e77892f">
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" onclick="checkHealth()">Check API</button>
      <button class="btn-secondary" onclick="loadSurveyList()">Refresh Surveys</button>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="panel">
    <h2>⚡ Quick Actions</h2>
    <div class="grid-2">
      <div>
        <label>Survey Title</label>
        <div class="key-val">
          <input id="surveyTitle" value="Perception Wave 2">
          <button class="btn-primary" onclick="createSurvey()">Create Survey</button>
        </div>
        <div class="response" id="surveyResult"></div>
      </div>
      <div>
        <label>Active Survey</label>
        <select id="surveySelect" onchange="onSurveyChange()"><option>-- none --</option></select>
        <div id="surveyInfo" style="font-size:0.8rem; color:var(--muted); margin-top:0.3rem"></div>
      </div>
    </div>
  </div>

  <!-- Create Version -->
  <div class="panel" id="versionPanel" style="display:none">
    <h2>📋 Create Version <span class="badge" id="surveyBadge"></span></h2>
    <div class="row">
      <div>
        <label>Schema JSON</label>
        <textarea id="schemaInput">{
  "languages": ["en", "ne"],
  "default_language": "en",
  "label": {"en": "Test Survey", "ne": "परीक्षण सर्वेक्षण"},
  "questions": [
    {
      "id": "q_age",
      "label": {"en": "Age group", "ne": "उमेर समूह"},
      "type": "select_one",
      "choices": [
        {"id": "young", "value": "young", "label": {"en": "18-35", "ne": "१८-३५"}},
        {"id": "old", "value": "old", "label": {"en": "36+", "ne": "३६+"}}
      ]
    },
    {
      "id": "q_vote",
      "label": {"en": "Vote", "ne": "मत"},
      "type": "select_one",
      "choices": [
        {"id": "a", "value": "a", "label": {"en": "Party A", "ne": "पार्टी ए"}},
        {"id": "b", "value": "b", "label": {"en": "Party B", "ne": "पार्टी बी"}}
      ]
    }
  ]
}</textarea>
        <div class="actions">
          <button class="btn-primary" onclick="createVersion()">Create Version</button>
        </div>
      </div>
      <div>
        <label>Stored Versions (this survey)</label>
        <div id="versionList" class="stored">-- none --</div>
        <label style="margin-top:0.75rem">Active Version ID</label>
        <input id="activeVersionId" placeholder="Select a version below...">
        <div class="actions">
          <button class="btn-secondary" onclick="publishVersion()">Publish Version</button>
          <button class="btn-secondary" onclick="copyVersionId()">Copy ID</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Submissions -->
  <div class="panel" id="submissionPanel" style="display:none">
    <h2>📥 Submission Sync</h2>
    <div class="row">
      <div>
        <label>Submission JSON (batch)</label>
        <textarea id="submissionInput">{
  "submissions": [{
    "id": "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa",
    "survey_version": "VERSION_ID",
    "answers": {"q_age": "young", "q_vote": "a"},
    "paradata": {"started_at": "2026-07-21T09:00:00", "ended_at": "2026-07-21T09:05:00"},
    "stratum": "urban",
    "cluster_id": "psu_001",
    "design_weight": 100.0
  }]
}</textarea>
      </div>
      <div>
        <label>Outcomes</label>
        <div id="submissionOutcomes" style="font-size:0.85rem;">Submit to see outcomes...</div>
        <div class="actions" style="margin-top:0.75rem">
          <button class="btn-primary" onclick="submitBatch()">Submit Batch</button>
          <button class="btn-secondary" onclick="fillTestSubmissions()">Fill Test Data (2 subs)</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Estimation -->
  <div class="panel" id="estimationPanel" style="display:none">
    <h2>📊 Estimates <span class="badge">Differentiator</span></h2>
    <div class="row">
      <div>
        <label>Calibration Margins (JSON)</label>
        <textarea id="marginsInput" style="min-height:80px;">{"q_age": {"young": 0.3, "old": 0.7}}</textarea>
        <div class="actions">
          <button class="btn-primary" onclick="runCalibrate()">Calibrate (Rake)</button>
        </div>
      </div>
      <div>
        <label>Scheme Name</label>
        <input id="schemeName" value="census">
        <label style="margin-top:0.5rem">Question</label>
        <input id="estimateQuestion" value="q_vote">
        <div class="actions">
          <button class="btn-primary" onclick="getEstimates()">Get Estimates</button>
        </div>
      </div>
    </div>
    <div id="estimateResults" class="response"></div>
  </div>

  <!-- Raw Response -->
  <div class="panel">
    <h2>📝 Raw Response</h2>
    <pre id="rawResponse">Responses will appear here...</pre>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const base = () => $('baseUrl').value.replace(/\/$/, '');
const token = () => $('token').value.trim();
const headers = () => {
  const h = { 'Content-Type': 'application/json' };
  if (token()) h['Authorization'] = 'Token ' + token();
  return h;
};

// Store versions per survey in memory
const versionStore = {};

async function api(method, path, body) {
  const url = base() + path;
  const opts = { method, headers: headers() };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  const data = await res.json().catch(() => ({ _error: 'Invalid JSON response', _status: res.status }));
  return { status: res.status, data };
}

function showResponse(data) {
  $('rawResponse').textContent = JSON.stringify(data, null, 2);
}

function onTokenChange() {
  checkHealth();
}

async function checkHealth() {
  $('statusText').textContent = 'Checking...';
  $('statusDot').className = 'dot';
  try {
    const { status, data } = await api('GET', '/api/surveys/');
    if (status === 200) {
      $('statusDot').className = 'dot online';
      $('statusText').textContent = 'API Online + Authenticated';
      loadSurveyList();
    } else if (status === 401) {
      $('statusDot').className = 'dot online';
      $('statusText').textContent = 'API Online (enter token)';
    } else {
      throw new Error('Bad status: ' + status);
    }
  } catch(e) {
    $('statusDot').className = 'dot';
    $('statusText').textContent = 'Offline / Error';
  }
}

async function createSurvey() {
  const title = $('surveyTitle').value.trim();
  if (!title) return alert('Enter a title');
  const { status, data } = await api('POST', '/api/surveys/', { title });
  showResponse(data);
  if (status === 201) {
    $('surveyResult').innerHTML = `<span style="color:var(--success)">✓ Created: <code>${data.id}</code></span>`;
    loadSurveyList();
  } else {
    $('surveyResult').innerHTML = `<span style="color:var(--error)">Error: ${JSON.stringify(data)}</span>`;
  }
}

async function loadSurveyList() {
  const { data } = await api('GET', '/api/surveys/');
  showResponse(data);
  const sel = $('surveySelect');
  const currentVal = sel.value;
  sel.innerHTML = '<option value="">-- none --</option>';
  if (Array.isArray(data)) {
    data.forEach(s => { 
      sel.innerHTML += `<option value="${s.id}">${s.title} (${s.id.slice(0,8)}...)</option>`; 
    });
    // Restore selection if it still exists
    if (data.find(s => s.id === currentVal)) sel.value = currentVal;
  }
}

function onSurveyChange() {
  const sid = $('surveySelect').value;
  if (!sid) {
    $('versionPanel').style.display = 'none';
    $('submissionPanel').style.display = 'none';
    $('estimationPanel').style.display = 'none';
    return;
  }
  $('versionPanel').style.display = '';
  $('submissionPanel').style.display = '';
  $('estimationPanel').style.display = '';
  $('surveyBadge').textContent = sid.slice(0,8);
  renderVersionList(sid);
}

async function createVersion() {
  const sid = $('surveySelect').value;
  if (!sid) return alert('Select a survey first');
  let schema;
  try { schema = JSON.parse($('schemaInput').value); } catch(e) { return alert('Invalid schema JSON'); }
  const { status, data } = await api('POST', `/api/surveys/${sid}/versions/`, { schema });
  showResponse(data);
  if (data.id) {
    // Store version
    if (!versionStore[sid]) versionStore[sid] = [];
    versionStore[sid].push(data);
    renderVersionList(sid);
    $('activeVersionId').value = data.id;
  }
}

function renderVersionList(sid) {
  const versions = versionStore[sid] || [];
  const div = $('versionList');
  if (versions.length === 0) {
    div.innerHTML = '<div style="color:var(--muted); font-size:0.8rem">No versions created yet. Create one →</div>';
    return;
  }
  div.innerHTML = versions.map(v => `
    <div class="stored-item" style="cursor:pointer" onclick="$('activeVersionId').value='${v.id}'; highlightVersion('${v.id}')">
      <span><span class="vid">v${v.version}</span> — ${v.schema?.label?.en || 'Untitled'}</span>
      <span class="status-tag ${v.status === 'published' ? 'status-published' : 'status-draft'}">${v.status}</span>
    </div>
  `).join('');
}

function highlightVersion(vid) {
  document.querySelectorAll('.stored-item').forEach(el => el.style.outline = 'none');
  document.querySelectorAll('.stored-item').forEach(el => {
    if (el.querySelector('.vid')?.textContent && el.querySelector('.vid').textContent) {
      // Simple highlight by checking the active input
    }
  });
}

function copyVersionId() {
  const vid = $('activeVersionId').value.trim();
  if (!vid) return alert('No version selected');
  navigator.clipboard.writeText(vid).then(() => alert('Copied!'));
}

async function publishVersion() {
  const vid = $('activeVersionId').value.trim();
  if (!vid) return alert('Select or create a version first');
  // Fix: no trailing slash on publish
  const { status, data } = await api('POST', `/api/versions/${vid}/publish`);
  showResponse(data);
  if (data.status === 'published') {
    // Update in store
    const sid = $('surveySelect').value;
    if (versionStore[sid]) {
      const v = versionStore[sid].find(v => v.id === vid);
      if (v) { v.status = 'published'; v.published_at = data.published_at; }
      renderVersionList(sid);
    }
    alert('Version published!');
  }
}

function fillTestSubmissions() {
  const vid = $('activeVersionId').value.trim();
  if (!vid) return alert('Select a published version first');
  const subs = [
    { id: crypto.randomUUID(), survey_version: vid, answers: { q_age: "young", q_vote: "a" }, paradata: { started_at: "2026-07-21T09:00:00", ended_at: "2026-07-21T09:05:00" }, stratum: "urban", cluster_id: "psu_001", design_weight: 100 },
    { id: crypto.randomUUID(), survey_version: vid, answers: { q_age: "old", q_vote: "b" }, paradata: { started_at: "2026-07-21T10:00:00", ended_at: "2026-07-21T10:05:00" }, stratum: "rural", cluster_id: "psu_002", design_weight: 150 }
  ];
  $('submissionInput').value = JSON.stringify({ submissions: subs }, null, 2);
}

async function submitBatch() {
  let batch;
  try { batch = JSON.parse($('submissionInput').value); } catch(e) { return alert('Invalid JSON'); }
  const { data } = await api('POST', '/api/sync/submissions/', batch);
  showResponse(data);
  if (data.results) {
    $('submissionOutcomes').innerHTML = data.results.map(r => 
      `<div style="margin-bottom:0.25rem"><span class="tag ${r.status}">${r.status}</span> <code>${r.id?.slice(0,16)}...</code></div>`
    ).join('');
  }
}

async function runCalibrate() {
  const sid = $('surveySelect').value;
  if (!sid) return alert('Select a survey');
  const name = $('schemeName').value.trim() || 'census';
  let margins;
  try { margins = JSON.parse($('marginsInput').value); } catch(e) { return alert('Invalid margins JSON'); }
  const { data } = await api('POST', `/api/surveys/${sid}/calibrate/`, { name, margins });
  showResponse(data);
}

async function getEstimates() {
  const sid = $('surveySelect').value;
  if (!sid) return alert('Select a survey');
  const scheme = $('schemeName').value.trim() || 'census';
  const question = $('estimateQuestion').value.trim() || 'q_vote';
  const { data } = await api('GET', `/api/surveys/${sid}/estimates/?question=${question}&scheme=${scheme}`);
  showResponse(data);
  if (data.estimates) {
    let html = '<div class="grid-2" style="margin-top:1rem">';
    for (const [key, val] of Object.entries(data.estimates)) {
      html += `<div class="estimate-card">
        <div class="prop">${(val.proportion * 100).toFixed(1)}%</div>
        <div class="label">${key} · SE: ${val.se?.toFixed(3)} · CI: [${val.ci95?.[0]?.toFixed(2)}, ${val.ci95?.[1]?.toFixed(2)}]</div>
      </div>`;
    }
    html += '</div>';
    html += `<div class="flag-bar">
      <span class="tag">n_eff: ${data.n_eff?.toFixed(1)}</span>
      <span class="tag">DEFF: ${data.deff?.toFixed(2)}</span>
      <span class="tag">Weighted: ${data.flags?.weighted}</span>
      <span class="tag">Self-selected: ${data.flags?.includes_self_selected}</span>
      ${data.flags?.non_representative_warning ? '<span class="tag" style="background:var(--error)">⚠ Non-representative</span>' : ''}
      <span class="tag">n: ${data.n}</span>
    </div>`;
    $('estimateResults').innerHTML = html;
  }
}

// Init
checkHealth();
</script>
</body>
</html>
